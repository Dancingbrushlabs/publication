<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>두 번째 그림책 프리뷰 | Dancing Brush</title>
    <meta
      name="description"
      content="Dancing Brush 두 번째 그림책의 장면을 한 장씩 넘겨보는 프리뷰 페이지."
    />
    <link rel="stylesheet" href="../../styles.css" />
    <link rel="stylesheet" href="preview.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../../" aria-label="Dancing Brush home">
        <span class="brand-mark" aria-hidden="true">DB</span>
        <span>Dancing Brush</span>
      </a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="../../#books">Books</a>
        <a href="../../#preview">Preview</a>
        <a href="../../#contact">Contact</a>
      </nav>
    </header>

    <main>
      <section class="preview-hero">
        <div class="reader" aria-live="polite">
          <button class="nav-button prev" type="button" aria-label="이전 장면">‹</button>
          <div class="flip-stage">
            <div class="flip-book" id="flip-book">
              <div class="book-page">
                <img src="../../assets/books/book2-1.jpg" alt="두 번째 그림책 프리뷰 장면 1" />
              </div>
              <div class="book-page">
                <img src="../../assets/books/book2-2.jpg" alt="두 번째 그림책 프리뷰 장면 2" />
              </div>
              <div class="book-page">
                <img src="../../assets/books/book2-3.jpg" alt="두 번째 그림책 프리뷰 장면 3" />
              </div>
              <div class="book-page">
                <img src="../../assets/books/book2-4.jpg" alt="두 번째 그림책 프리뷰 장면 4" />
              </div>
            </div>
          </div>
          <button class="nav-button next" type="button" aria-label="다음 장면">›</button>
        </div>

        <div class="preview-heading">
          <div>
            <p class="eyebrow">Book Preview</p>
            <h1>두 번째 그림책</h1>
          </div>
          <p class="hero-copy">
            장면을 한 장씩 넘기며 확인할 수 있는 프리뷰입니다. 좌우 버튼으로
            다음 장면을 볼 수 있습니다.
          </p>
        </div>

        <div class="reader-footer">
          <a class="text-link" href="../../#preview">메인으로 돌아가기</a>
          <span id="page-count">1 / 4</span>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <script src="preview.js"></script>
  </body>
</html>
