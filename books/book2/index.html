<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>바다로 가는 초록 기차 | Dancing Brush</title>
    <meta
      name="description"
      content="바다로 가는 초록 기차의 장면을 한 장씩 넘겨보는 Dancing Brush 그림책 프리뷰 페이지."
    />
    <link rel="stylesheet" href="../../styles.css" />
    <link rel="stylesheet" href="preview.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../../" aria-label="Dancing Brush home">
        <span class="brand-mark" aria-hidden="true">DB</span>
        <span>Dancing Brush</span>
      </a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="../../#books">Books</a>
        <a href="../../#preview">Preview</a>
        <a href="../../#contact">Contact</a>
      </nav>
    </header>

    <main>
      <section class="preview-hero">
        <div class="reader" aria-live="polite">
          <button class="nav-button prev" type="button" aria-label="이전 장면">‹</button>
          <div class="flip-stage">
            <div class="flip-book" id="flip-book">
              <div class="book-page">
                <img src="../../assets/books/book2-1.jpg" alt="바닷가 철교 위 초록 기차와 창밖을 보는 아이" />
              </div>
              <div class="book-page">
                <img src="../../assets/books/book2-2.jpg" alt="바닷가 역에 내린 아이와 함께 걷는 어른" />
              </div>
              <div class="book-page">
                <img src="../../assets/books/book2-3.jpg" alt="파도 속에서 즐겁게 뛰노는 아이" />
              </div>
              <div class="book-page">
                <img src="../../assets/books/book2-4.jpg" alt="바닷가 모래성을 만드는 아이" />
              </div>
            </div>
          </div>
          <button class="nav-button next" type="button" aria-label="다음 장면">›</button>
        </div>

        <div class="preview-heading">
          <div>
            <p class="eyebrow">Book Preview</p>
            <h1><span>바다로 가는</span><span>초록 기차</span></h1>
          </div>
          <div class="preview-text">
            <p class="scene-label" id="scene-title">초록 기차가 바다를 향해 달립니다</p>
            <p class="hero-copy" id="scene-copy">
              햇빛이 부서지는 바다 위로 초록 기차가 지나가고, 아이는 창밖으로
              펼쳐지는 풍경을 바라봅니다. 이 장면에서 작은 여행의 설렘이
              시작됩니다.
            </p>
          </div>
        </div>

        <div class="reader-footer">
          <a class="text-link" href="../../#preview">메인으로 돌아가기</a>
          <span id="page-count">1 / 4</span>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <script src="preview.js"></script>
  </body>
</html>
