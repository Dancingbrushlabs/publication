<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 190" role="img" aria-labelledby="title desc">
  <title id="title">Choomboot Publishing</title>
  <desc id="desc">The four O letters in CHOOMBOOT form a two-by-two typographic grid, surrounded by C, H, M, B, and T.</desc>

  <g font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="800">
    <text x="10" y="86" fill="#B76CF0">C</text>
    <text x="66" y="86" fill="#43B4EC">H</text>
    <text x="126" y="86" fill="#B76CF0">O</text>
    <text x="186" y="86" fill="#43B4EC">O</text>
    <text x="246" y="86" fill="#82C98A">M</text>

    <text x="66" y="146" fill="#82C98A">B</text>
    <text x="126" y="146" fill="#43B4EC">O</text>
    <text x="186" y="146" fill="#B76CF0">O</text>
    <text x="252" y="146" fill="#43B4EC">T</text>
  </g>
</svg>
